<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classification System Simulator</title>

    <!-- Load CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Biology Classification Simulator</h1>
<p>Aligned to Florida Biology Standards SC.912.L.15.6–15.8</p>

<section id="simulator">
    <h2>Classify the Organism</h2>

    <p>Select the correct Kingdom, Phylum, Class, Order, Family, Genus, and Species for each organism based on traits.</p>

    <div id="question-box"></div>

    <div id="options"></div>

    <button id="checkAnswer">Check Answer</button>

    <p id="feedback"></p>
</section>

<hr>

<section id="quiz-section">
    <h2>Quick 5‑Question Classification Quiz</h2>
    <div id="quiz"></div>
    <button id="submitQuiz">Submit Quiz</button>
    <p id="quizResult"></p>
</section>

<!-- Load JS -->
<script src="main.js"></script>

</body>
</html>
